name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install devkitPro
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman -y
          sudo dkp-pacman -Sy --noconfirm
          sudo dkp-pacman -S --noconfirm 3ds-dev 3ds-curl 3ds-mbedtls 3ds-libpng

      - name: Add devkitPro tools to PATH
        run: echo "/opt/devkitpro/devkitARM/bin:/opt/devkitpro/tools/bin" >> "$GITHUB_PATH"

      - name: Build 3DS app
        working-directory: 3ds_google_maps_src
        run: |
          make clean
          make

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: 3ds_google_maps
          path: 3ds_google_maps_src/3ds_google_maps.3dsx

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: 3ds_google_maps_src/3ds_google_maps.3dsx
